name: Deploy MCP Server

on:
  workflow_dispatch:
  push:
    paths:
      - 'mcp-server/**'

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 5
    env:
      HTTP_PROXY: 'http://127.0.0.1:7890'
      HTTPS_PROXY: 'http://127.0.0.1:7890'

    steps:
      - name: Checkout
        run: |
          cd /opt/actions-runner/_work/developer_hos/developer_hos
          git fetch origin master --depth=1
          git reset --hard origin/master

      - name: Sync MCP code
        run: |
          mkdir -p /opt/mcp-harmonyos
          rsync -a --delete \
            /opt/actions-runner/_work/developer_hos/developer_hos/mcp-server/ \
            /opt/mcp-harmonyos/

      - name: Install system deps
        run: |
          apt-get update -qq
          apt-get install -y -qq python3-venv python3-pip

      - name: Setup venv & install deps
        run: |
          python3 -m venv /opt/mcp-harmonyos/venv
          /opt/mcp-harmonyos/venv/bin/pip install --upgrade pip \
            -i https://pypi.tuna.tsinghua.edu.cn/simple
          /opt/mcp-harmonyos/venv/bin/pip install -r /opt/mcp-harmonyos/requirements.txt \
            -i https://pypi.tuna.tsinghua.edu.cn/simple

      - name: Install systemd service
        run: |
          cp /opt/mcp-harmonyos/mcp-harmonyos.service /etc/systemd/system/
          systemctl daemon-reload
          systemctl enable mcp-harmonyos
          systemctl restart mcp-harmonyos

      - name: Configure nginx
        run: |
          NGINX_CONF=/etc/nginx/sites-enabled/homs
          if ! grep -q "location /mcp" "$NGINX_CONF" 2>/dev/null; then
            sed -i '/^}$/i\    include /opt/mcp-harmonyos/nginx-mcp.conf;' "$NGINX_CONF"
            nginx -t && systemctl reload nginx
            echo "Nginx MCP proxy added"
          else
            echo "Nginx MCP proxy already configured"
          fi

      - name: Verify
        run: |
          sleep 2
          systemctl status mcp-harmonyos --no-pager
          echo "---"
          echo "MCP available at: http://homs.coolfinds.cool/mcp/"
