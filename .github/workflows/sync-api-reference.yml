name: Sync API Reference

on:
  schedule:
    # 每天晚上北京时间 23:00 (UTC 15:00)
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          sparse-checkout: |
            api-reference
            scripts/sync-api-reference.py
          sparse-checkout-cone-mode: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        run: python3 scripts/sync-api-reference.py

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain api-reference/) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add api-reference/
            git commit -m "chore: daily API reference sync [skip ci]

            Auto-synced from developer.huawei.com harmonyos-references catalog."
            git push origin master
          else
            echo "No changes, skipping commit."
          fi
