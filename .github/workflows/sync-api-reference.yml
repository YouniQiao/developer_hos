name: Sync API Reference

on:
  schedule:
    # 每天北京时间凌晨 2:00 (UTC 18:00)
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        run: python3 scripts/sync-api-reference.py

      - name: Commit and push if changed
        run: |
          if [[ -n $(git status --porcelain api-reference/) ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add api-reference/
            git commit -m "chore: daily API reference sync [skip ci]

            Auto-synced from developer.huawei.com harmonyos-references catalog."
            git push origin master
          else
            echo "No changes, skipping commit."
          fi
