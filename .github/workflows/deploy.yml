name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 360
    env:
      HTTP_PROXY: 'http://127.0.0.1:7890'
      HTTPS_PROXY: 'http://127.0.0.1:7890'
    steps:
      - name: Checkout
        run: |
          rm -f .git/shallow.lock .git/index.lock 2>/dev/null
          if [ -d .git ]; then
            git fetch origin master --depth=1
            git reset --hard origin/master
          else
            git clone --depth=1 --branch master \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install deps
        run: npm ci

      - name: Setup swap
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 20G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Build
        run: |
          echo "=== Memory before build ==="
          free -h
          echo "=== Node version ==="
          node --version
          npx docusaurus build --no-minify 2>&1 | tee /tmp/build.log
          echo "EXIT=${PIPESTATUS[0]}"
        env:
          NODE_OPTIONS: '--max-old-space-size=12288'
          DOCUSAURUS_SSG_CONCURRENCY: '1'

      - name: Build log diagnostics
        if: failure()
        run: |
          echo "=== Build failed, checking logs ==="
          echo "=== Last 50 lines of build log ==="
          tail -50 /tmp/build.log 2>/dev/null || echo "(no build log)"
          echo "=== Memory after build ==="
          free -h
          echo "=== dmesg (OOM) ==="
          dmesg | grep -i 'oom\|killed' | tail -20 || echo "(no OOM messages)"

      - name: Sync to preview site (local Nginx)
        if: success()
        run: |
          echo "📦 同步构建产物到预览站..."
          rm -rf /var/www/preview/*
          cp -r build/* /var/www/preview/
          echo "✅ 预览站已更新: http://$(hostname -I | awk '{print $1}')"

      - name: Deploy to Netlify
        run: |
          if ! command -v netlify &> /dev/null; then
            npm install -g netlify-cli
          fi
          netlify deploy \
            --prod \
            --dir=build \
            --functions=netlify/functions \
            --message "Deploy ${{ github.sha }}"
        timeout-minutes: 360
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          HTTP_PROXY: ''
          HTTPS_PROXY: ''
