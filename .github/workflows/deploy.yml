name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]
    env:
      HTTP_PROXY: 'http://127.0.0.1:7890'
      HTTPS_PROXY: 'http://127.0.0.1:7890'
      CACHE_DIR: ${{ github.workspace }}/../_docusaurus_cache
    steps:
      - name: Fast checkout (self-hosted, incremental)
        run: |
          # Clean up stale git locks from cancelled runs
          rm -f .git/shallow.lock .git/index.lock 2>/dev/null
          if [ -d .git ]; then
            git fetch origin master --depth=1
            git reset --hard origin/master
          else
            git clone --depth=1 --branch master \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure swap (16GB safety net)
        run: |
          if [ $(free -m | awk '/^Swap:/{print $2}') -lt 14336 ]; then
            echo "📦 创建 16GB swap..."
            swapoff /swapfile 2>/dev/null || true; rm -f /swapfile
            fallocate -l 16G /swapfile
            chmod 600 /swapfile
            mkswap /swapfile
            swapon /swapfile
            echo "✅ swap 已启用: $(free -h | grep Swap)"
          else
            echo "✅ swap 已足够 (≥14GB), 跳过"
          fi

      - name: Restore build caches (MDX + Rspack)
        run: |
          mkdir -p "$CACHE_DIR"
          if [ -d "$CACHE_DIR/.docusaurus" ]; then
            rm -rf .docusaurus
            cp -r "$CACHE_DIR/.docusaurus" .docusaurus
            echo "♻️  .docusaurus restored ($(du -sh .docusaurus | cut -f1))"
          else
            echo "🆕 no .docusaurus cache yet (first run)"
          fi

      - name: Install deps (only when needed — preserve bundler cache)
        run: |
          if [ -d node_modules ] && cmp -s package-lock.json /tmp/hos-lockfile 2>/dev/null; then
            echo "✅ node_modules up to date, skipped"
            # Restore bundler cache even when skipping npm ci (safety net)
            if [ -d "$CACHE_DIR/bundler-cache" ] && [ ! -d node_modules/.cache/webpack ]; then
              mkdir -p node_modules/.cache
              cp -r "$CACHE_DIR/bundler-cache"/* node_modules/.cache/
              echo "♻️  bundler cache restored"
            fi
          else
            echo "📦 Installing dependencies..."
            npm ci
            cp package-lock.json /tmp/hos-lockfile
            # Restore bundler cache that npm ci just wiped
            if [ -d "$CACHE_DIR/bundler-cache" ]; then
              mkdir -p node_modules/.cache
              cp -r "$CACHE_DIR/bundler-cache"/* node_modules/.cache/
              echo "♻️  bundler cache restored after npm ci"
            fi
          fi

      - name: Tune system for build
        run: |
          sysctl -w vm.swappiness=10
          sysctl -w vm.vfs_cache_pressure=50

      - name: Build (skip if fresh AND source unchanged)
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ -f build/.build-success ] && [ -f build/.build-commit ] && \
             [ "$(cat build/.build-commit)" = "$CURRENT_SHA" ] && \
             [ $(find build/.build-success -mmin -180) ]; then
            echo "✅ build/ 新鲜且源码未变 (${CURRENT_SHA:0:7})，跳过构建"
          else
            echo "🔨 开始全量构建 (${CURRENT_SHA:0:7})..."
            rm -rf build/
            ulimit -S -n 65536
            nice -n -15 npx docusaurus build --no-minify
            echo "$CURRENT_SHA" > build/.build-commit
            touch build/.build-success
          fi
        timeout-minutes: 360
        env:
          NODE_OPTIONS: '--max-old-space-size=14336 --max-semi-space-size=64 --v8-pool-size=6'
          GENERATE_SOURCEMAP: 'false'
          UV_THREADPOOL_SIZE: '8'
          DOCUSAURUS_SSG_WORKER_THREADS: '2'

      - name: Save build caches (on success)
        if: success()
        run: |
          mkdir -p "$CACHE_DIR"
          if [ -d .docusaurus ]; then
            rm -rf "$CACHE_DIR/.docusaurus"
            cp -r .docusaurus "$CACHE_DIR/.docusaurus"
            echo "💾 .docusaurus cache saved ($(du -sh .docusaurus | cut -f1))"
          fi
          if [ -d node_modules/.cache ]; then
            rm -rf "$CACHE_DIR/bundler-cache"
            cp -r node_modules/.cache "$CACHE_DIR/bundler-cache"
            echo "💾 bundler cache saved ($(du -sh node_modules/.cache | cut -f1))"
          fi

      - name: Deploy to Netlify
        run: |
          if [ ! -f build/.build-success ]; then
            echo "❌ 构建产物不完整，跳过部署"
            exit 1
          fi
          if ! command -v netlify &> /dev/null; then
            npm install -g netlify-cli
          fi
          netlify deploy \
            --prod \
            --dir=build \
            --functions=netlify/functions \
            --message "Deploy ${{ github.sha }}"
        timeout-minutes: 360
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
