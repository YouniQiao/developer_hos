name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Fast checkout (self-hosted, incremental)
        run: |
          if [ -d .git ]; then
            git fetch origin master --depth=1
            git reset --hard origin/master
          else
            git clone --depth=1 --branch master \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps (only when lockfile changed)
        run: |
          if ! cmp -s package-lock.json /tmp/hos-lockfile 2>/dev/null; then
            echo "📦 package-lock.json changed, installing..."
            npm ci
            cp package-lock.json /tmp/hos-lockfile
          else
            echo "✅ node_modules up to date, skipped"
          fi

      - name: Build (full, 16GB MacBook)
        run: |
          ulimit -S -n 65536
          npx docusaurus build --no-minify
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          GENERATE_SOURCEMAP: 'false'

      - name: Deploy to Netlify
        run: |
          if ! command -v netlify &> /dev/null; then
            npm install -g netlify-cli
          fi
          netlify deploy \
            --prod \
            --dir=build \
            --functions=netlify/functions \
            --message "Deploy ${{ github.sha }}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          HTTP_PROXY: ''
          HTTPS_PROXY: ''
