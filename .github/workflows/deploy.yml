name: Deploy to Netlify

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: [self-hosted, linux, x64]
    env:
      HTTP_PROXY: 'http://127.0.0.1:7890'
      HTTPS_PROXY: 'http://127.0.0.1:7890'
      CACHE_DIR: ${{ github.workspace }}/../_docusaurus_cache
    steps:
      - name: Fast checkout (self-hosted, incremental)
        run: |
          # Clean up stale git locks from cancelled runs
          rm -f .git/shallow.lock .git/index.lock 2>/dev/null
          if [ -d .git ]; then
            git fetch origin master --depth=1
            git reset --hard origin/master
          else
            git clone --depth=1 --branch master \
              https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      # DISABLED: swappiness/zram tuning may interfere with Node.js GC
      # - name: Ensure swap (16GB safety net)
      #   run: |
      #     if [ $(free -m | awk '/^Swap:/{print $2}') -lt 14336 ]; then
      #       echo "📦 创建 16GB swap..."
      #       swapoff /swapfile 2>/dev/null || true; rm -f /swapfile
      #       fallocate -l 16G /swapfile
      #       chmod 600 /swapfile
      #       mkswap /swapfile
      #       swapon /swapfile
      #       echo "✅ swap 已启用: $(free -h | grep Swap)"
      #     else
      #       echo "✅ swap 已足够 (≥14GB), 跳过"
      #     fi
      #
      # - name: Setup zram (16GB compressed RAM swap)
      #   run: |
      #     if ! swapon --show | grep -q zram; then
      #       echo "📦 启用 16GB zram (内存压缩)..."
      #       modprobe zram
      #       echo 16G > /sys/block/zram0/disksize
      #       mkswap /dev/zram0
      #       swapon -p 100 /dev/zram0
      #     fi
      #     echo "✅ swap 状态:"
      #     swapon --show
      #
      # - name: Tune system for build
      #   run: |
      #     sysctl -w vm.swappiness=100
      #     sysctl -w vm.vfs_cache_pressure=50
      
      - name: Restore build caches (MDX + Rspack)
        run: |
          mkdir -p "$CACHE_DIR"
          # Restore .docusaurus cache — skips compilation on cache hit
          if [ -d "$CACHE_DIR/.docusaurus" ]; then
            rm -rf .docusaurus
            cp -r "$CACHE_DIR/.docusaurus" .docusaurus
            echo "♻️  .docusaurus cache restored ($(du -sh .docusaurus | cut -f1))"
          else
            echo "🆕 首次构建，无缓存可恢复"
          fi
          # Restore bundler cache
          if [ -d "$CACHE_DIR/bundler-cache" ]; then
            mkdir -p node_modules/.cache
            cp -r "$CACHE_DIR/bundler-cache"/* node_modules/.cache/
            echo "♻️  bundler cache restored"
          fi

      - name: Install deps (only when needed — preserve bundler cache)
        run: |
          if [ -d node_modules ] && cmp -s package-lock.json /tmp/hos-lockfile 2>/dev/null; then
            echo "✅ node_modules up to date, skipped"
            # Restore bundler cache even when skipping npm ci (safety net)
            if [ -d "$CACHE_DIR/bundler-cache" ] && [ ! -d node_modules/.cache/webpack ]; then
              mkdir -p node_modules/.cache
              cp -r "$CACHE_DIR/bundler-cache"/* node_modules/.cache/
              echo "♻️  bundler cache restored"
            fi
          else
            echo "📦 Installing dependencies..."
            npm ci
            cp package-lock.json /tmp/hos-lockfile
            # Restore bundler cache that npm ci just wiped
            if [ -d "$CACHE_DIR/bundler-cache" ]; then
              mkdir -p node_modules/.cache
              cp -r "$CACHE_DIR/bundler-cache"/* node_modules/.cache/
              echo "♻️  bundler cache restored after npm ci"
            fi
          fi

      - name: Memory diagnostics
        run: |
          echo "=== 系统内存限制 ==="
          echo "overcommit_memory: $(cat /proc/sys/vm/overcommit_memory)"
          echo "overcommit_ratio: $(cat /proc/sys/vm/overcommit_ratio)"
          echo "=== THP ==="
          cat /sys/kernel/mm/transparent_hugepage/enabled 2>/dev/null || echo "N/A"
          echo "=== ulimit ==="
          ulimit -a | grep -E "virtual|data|stack|memory|locked"
          echo "=== systemd cgroup ==="
          cat /sys/fs/cgroup/memory.max 2>/dev/null || echo "no cgroup v2"
          cat /sys/fs/cgroup/memory/memory.limit_in_bytes 2>/dev/null || echo "no cgroup v1"
          echo "=== Node.js 21GB 内存分配测试 ==="
          node -e "
            const chunks = [];
            try {
              for (let i = 0; i < 22; i++) {
                chunks.push(Buffer.alloc(1024 * 1024 * 1024)); // 1GB each
                console.log('  allocated ' + (i + 1) + 'GB, RSS: ' + 
                  Math.round(process.memoryUsage().rss / 1024 / 1024) + 'MB');
              }
              console.log('✅ 22GB 分配成功，无系统级硬限制');
            } catch(e) {
              console.log('❌ 分配失败在第 ' + (chunks.length + 1) + 'GB: ' + e.message);
            }
          "
          echo "=== 测试后内存 ==="
          free -h

      - name: Cleanup before build
        run: |
          pkill -f "docusaurus build" 2>/dev/null || true
          pkill -f "webpack" 2>/dev/null || true
          echo "🧹 清理完成, 当前内存: $(free -h | grep Mem)"

      - name: Build (skip if fresh AND source unchanged)
        run: |
          CURRENT_SHA=$(git rev-parse HEAD)
          if [ -f build/.build-success ] && [ -f build/.build-commit ] && \
             [ "$(cat build/.build-commit)" = "$CURRENT_SHA" ] && \
             [ $(find build/.build-success -mmin -180) ]; then
            echo "✅ build/ 新鲜且源码未变 (${CURRENT_SHA:0:7})，跳过构建"
          else
            echo "🔨 开始全量构建 (${CURRENT_SHA:0:7})..."
            rm -rf build/
            ulimit -S -n 65536
            # Memory monitor in background — logs every 30s
            while true; do
              echo "[mem-monitor] $(date +%H:%M:%S) $(free -h | grep Mem)"
              sleep 30
            done &
            MONITOR_PID=$!
            npx docusaurus build --no-minify
            BUILD_EXIT=$?
            kill $MONITOR_PID 2>/dev/null || true
            if [ $BUILD_EXIT -ne 0 ]; then
              echo "❌ Build failed with exit code $BUILD_EXIT"
              echo "[mem-monitor] final: $(free -h | grep Mem)"
              exit $BUILD_EXIT
            fi
            echo "$CURRENT_SHA" > build/.build-commit
            touch build/.build-success
          fi
        timeout-minutes: 360
        env:
          NODE_OPTIONS: '--max-old-space-size=8192'
          HTTP_PROXY: ''
          HTTPS_PROXY: ''
          # Worker thread recycling: 4 workers, 256MB each = max 1GB active
          # Workers get killed & respawned when exceeding limit, preventing
          # the require() / webpack module cache leak during SSG
          # See: https://github.com/facebook/docusaurus/issues/11161
          DOCUSAURUS_SSG_WORKER_THREADS: '4'
          DOCUSAURUS_SSG_WORKER_THREAD_TASK_SIZE: '5'
          DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY: '268435456'

      - name: Save build caches (on success)
        if: success()
        run: |
          mkdir -p "$CACHE_DIR"
          if [ -d .docusaurus ]; then
            rm -rf "$CACHE_DIR/.docusaurus"
            cp -r .docusaurus "$CACHE_DIR/.docusaurus"
            echo "💾 .docusaurus cache saved ($(du -sh .docusaurus | cut -f1))"
          fi
          if [ -d node_modules/.cache ]; then
            rm -rf "$CACHE_DIR/bundler-cache"
            cp -r node_modules/.cache "$CACHE_DIR/bundler-cache"
            echo "💾 bundler cache saved ($(du -sh node_modules/.cache | cut -f1))"
          fi

      - name: Sync to preview site (local Nginx)
        if: success()
        run: |
          echo "📦 同步构建产物到预览站..."
          rm -rf /var/www/preview/
          mkdir -p /var/www/preview/
          cp -r build/* /var/www/preview/
          echo "✅ 预览站已更新: http://$(hostname -I | awk '{print $1}')"

      - name: Deploy to Netlify
        run: |
          if [ ! -f build/.build-success ]; then
            echo "❌ 构建产物不完整，跳过部署"
            exit 1
          fi
          if ! command -v netlify &> /dev/null; then
            npm install -g netlify-cli
          fi
          netlify deploy \
            --prod \
            --dir=build \
            --functions=netlify/functions \
            --message "Deploy ${{ github.sha }}"
        timeout-minutes: 360
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
