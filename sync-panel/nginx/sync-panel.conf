# 文档同步审批工作台 Nginx 配置
#
# 部署：
#   sudo cp /opt/sync-panel/nginx/sync-panel.conf /etc/nginx/sites-available/
#   sudo ln -s /etc/nginx/sites-available/sync-panel.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# 启用 HTTPS（certbot 会自动生成证书并改写此配置，增加 443 块与 80→443 跳转）：
#   sudo certbot --nginx -d sync.developer.harmonyos.cool

# HTTP（certbot 签发证书后会把此处改为重定向到 HTTPS，并新增 443 server 块）
server {
    listen 80;
    listen [::]:80;
    server_name sync.developer.harmonyos.cool;

    # certbot 续签验证目录（certbot --nginx 会自动管理，预留兼容）
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 后端 API 反向代理到 FastAPI (端口 8766)
    location /api/ {
        proxy_pass http://127.0.0.1:8766;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 同步检测可能耗时较长
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # 前端静态文件 + SPA history fallback
    root /opt/sync-panel/frontend;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

